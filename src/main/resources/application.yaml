spring:
  datasource:
    url: jdbc:h2:mem:eventsdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://cognito-idp.<REGION>.amazonaws.com/<USER_POOL_ID> # REEMPLAZA ESTO